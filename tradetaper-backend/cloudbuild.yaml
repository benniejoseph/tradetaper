# cloudbuild.yaml for tradetaper-backend

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/tradetaper-backend:latest', '.']
    id: 'Build'

  # Push the Docker image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/tradetaper-backend:latest']
    waitFor: ['Build']
    id: 'Push'

  # Deploy to Cloud Run
  # env-vars-cloudrun.yaml holds all env vars EXCEPT DB_PASSWORD and GEMINI_API_KEY,
  # which are managed via Secret Manager (--update-secrets below).
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'tradetaper-backend'
      - '--image=gcr.io/$PROJECT_ID/tradetaper-backend:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--env-vars-file=env-vars-cloudrun.yaml'
      - '--update-secrets=DB_PASSWORD=TRADETAPER_DB_PASSWORD:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest'
    id: 'Deploy'
    waitFor: ['Push']

images:
  - 'gcr.io/$PROJECT_ID/tradetaper-backend:latest'
